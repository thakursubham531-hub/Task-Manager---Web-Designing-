<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .form-box {
      background: white;
      padding: 20px;
      border: 1px solid #ccc;
      margin-bottom: 20px;
    }

    .form-box input,
    .form-box textarea,
    .form-box select {
      width: 100%;
      padding: 8px;
      margin: 6px 0 12px 0;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 14px;
    }

    .form-box label {
      font-weight: bold;
      font-size: 14px;
    }

    .form-box button {
      background: #333;
      color: white;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
      font-size: 14px;
      width: 100%;
    }

    .form-box button:hover {
      background: #555;
    }

    .filters {
      margin-bottom: 16px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filters select {
      padding: 6px 10px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: white;
    }

    .task {
      background: white;
      border: 1px solid #ccc;
      border-left: 5px solid #333;
      padding: 14px;
      margin-bottom: 10px;
    }

    .task.high   { border-left-color: #e74c3c; }
    .task.medium { border-left-color: #f39c12; }
    .task.low    { border-left-color: #27ae60; }

    .task.done {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .task h3 {
      margin: 0 0 6px 0;
      font-size: 16px;
    }

    .task p {
      margin: 4px 0;
      font-size: 13px;
      color: #555;
    }

    .task-footer {
      margin-top: 10px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .task-footer select {
      padding: 4px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
    }

    .task-footer button {
      padding: 4px 10px;
      font-size: 13px;
      border: 1px solid #ccc;
      background: white;
      cursor: pointer;
    }

    .task-footer button:hover {
      background: #fdd;
      border-color: #e74c3c;
      color: #e74c3c;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .stat {
      background: white;
      border: 1px solid #ccc;
      padding: 10px 16px;
      text-align: center;
      flex: 1;
      min-width: 80px;
    }

    .stat span {
      display: block;
      font-size: 24px;
      font-weight: bold;
      color: #333;
    }

    .stat small {
      font-size: 11px;
      color: #888;
    }

    .empty {
      text-align: center;
      color: #999;
      padding: 40px;
      background: white;
      border: 1px solid #ccc;
    }

    .overdue { color: #e74c3c; font-weight: bold; }
    .today   { color: #f39c12; font-weight: bold; }
  </style>
</head>
<body>

  <h1>Task Manager</h1>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><span id="s-all">0</span><small>Total</small></div>
    <div class="stat"><span id="s-pending">0</span><small>Pending</small></div>
    <div class="stat"><span id="s-progress">0</span><small>In Progress</small></div>
    <div class="stat"><span id="s-done">0</span><small>Done</small></div>
  </div>

  <!-- Add Task Form -->
  <div class="form-box">
    <label>Task Name</label>
    <input type="text" id="name" placeholder="What needs to be done?">

    <label>Details</label>
    <textarea id="details" rows="2" placeholder="Any extra info..."></textarea>

    <label>Due Date</label>
    <input type="date" id="date">

    <label>Importance</label>
    <select id="importance">
      <option value="high">High</option>
      <option value="medium" selected>Medium</option>
      <option value="low">Low</option>
    </select>

    <label>Difficulty</label>
    <select id="difficulty">
      <option value="hard">Hard</option>
      <option value="medium" selected>Medium</option>
      <option value="easy">Easy</option>
    </select>

    <button onclick="addTask()">Add Task</button>
  </div>

  <!-- Filters -->
  <div class="filters">
    <select id="filter" onchange="render()">
      <option value="all">All Tasks</option>
      <option value="pending">Pending</option>
      <option value="in-progress">In Progress</option>
      <option value="completed">Completed</option>
    </select>
    <select id="sort" onchange="render()">
      <option value="">Sort by...</option>
      <option value="date">Due Date</option>
      <option value="importance">Importance</option>
      <option value="difficulty">Difficulty</option>
    </select>
  </div>

  <!-- Task List -->
  <div id="list"></div>

  <script>
    var tasks = JSON.parse(localStorage.getItem('tasks_basic') || '[]');

    function save() {
      localStorage.setItem('tasks_basic', JSON.stringify(tasks));
    }

    function addTask() {
      var name = document.getElementById('name').value.trim();
      var date = document.getElementById('date').value;
      if (!name) { alert('Please enter a task name.'); return; }
      if (!date) { alert('Please pick a due date.'); return; }

      tasks.push({
        id: Date.now(),
        name: name,
        details: document.getElementById('details').value.trim(),
        date: date,
        importance: document.getElementById('importance').value,
        difficulty: document.getElementById('difficulty').value,
        status: 'pending'
      });

      save();
      render();

      document.getElementById('name').value = '';
      document.getElementById('details').value = '';
      document.getElementById('date').value = '';
    }

    function deleteTask(id) {
      if (!confirm('Delete this task?')) return;
      tasks = tasks.filter(function(t) { return t.id !== id; });
      save();
      render();
    }

    function updateStatus(id, status) {
      var t = tasks.find(function(t) { return t.id === id; });
      if (t) { t.status = status; save(); render(); }
    }

    function dueLabel(dateStr, status) {
      if (status === 'completed') return '';
      var today = new Date(); today.setHours(0,0,0,0);
      var due = new Date(dateStr + 'T00:00:00');
      var diff = Math.round((due - today) / 86400000);
      if (diff < 0)  return '<span class="overdue">Overdue by ' + Math.abs(diff) + ' day(s)</span>';
      if (diff === 0) return '<span class="today">Due today</span>';
      if (diff === 1) return 'Due tomorrow';
      return 'Due ' + due.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
    }

    function render() {
      var filter = document.getElementById('filter').value;
      var sort   = document.getElementById('sort').value;
      var list   = tasks.slice();

      if (filter !== 'all') {
        list = list.filter(function(t) { return t.status === filter; });
      }

      if (sort === 'date') {
        list.sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
      } else if (sort === 'importance') {
        var io = {high:3, medium:2, low:1};
        list.sort(function(a,b) { return io[b.importance] - io[a.importance]; });
      } else if (sort === 'difficulty') {
        var dfo = {hard:3, medium:2, easy:1};
        list.sort(function(a,b) { return dfo[b.difficulty] - dfo[a.difficulty]; });
      }

      var html = '';
      if (list.length === 0) {
        html = '<div class="empty">No tasks here.</div>';
      } else {
        list.forEach(function(t) {
          var cls = t.importance + (t.status === 'completed' ? ' done' : '');
          html += '<div class="task ' + cls + '">';
          html += '<h3>' + t.name + '</h3>';
          if (t.details) html += '<p>' + t.details + '</p>';
          html += '<p><b>Due:</b> ' + t.date + ' &nbsp; ' + dueLabel(t.date, t.status) + '</p>';
          html += '<p><b>Importance:</b> ' + t.importance + ' &nbsp; <b>Difficulty:</b> ' + t.difficulty + '</p>';
          html += '<div class="task-footer">';
          html += '<select onchange="updateStatus(' + t.id + ', this.value)">';
          html += '<option value="pending"'     + (t.status==='pending'     ? ' selected':'') + '>Pending</option>';
          html += '<option value="in-progress"' + (t.status==='in-progress' ? ' selected':'') + '>In Progress</option>';
          html += '<option value="completed"'   + (t.status==='completed'   ? ' selected':'') + '>Completed</option>';
          html += '</select>';
          html += '<button onclick="deleteTask(' + t.id + ')">Delete</button>';
          html += '</div></div>';
        });
      }

      document.getElementById('list').innerHTML = html;

      document.getElementById('s-all').textContent     = tasks.length;
      document.getElementById('s-pending').textContent = tasks.filter(function(t){return t.status==='pending';}).length;
      document.getElementById('s-progress').textContent= tasks.filter(function(t){return t.status==='in-progress';}).length;
      document.getElementById('s-done').textContent    = tasks.filter(function(t){return t.status==='completed';}).length;
    }

    render();
  </script>

</body>
</html>
